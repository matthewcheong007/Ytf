<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Register for NYP Yong Tau Foo updates and online ordering.">
  <title>Register | NYP Yong Tau Foo</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="nav-wrap">
      <a class="brand" href="index.html" aria-label="NYP Yong Tau Foo home">
        <h1>NYP Yong Tau Foo</h1>
        <p>Fresh bowls, made daily</p>
      </a>
      <input class="nav-toggle" type="checkbox" id="nav-toggle">
      <label class="nav-toggle-label" for="nav-toggle" aria-label="Open menu"><span></span></label>
      <nav class="site-nav" aria-label="Main navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="menu.html">Menu</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="contact.html">Contact</a></li>
          <li><a href="register.html" class="active">Register</a></li>
          <li><a href="login.html">Login</a></li>
          <li><a href="order.html" class="nav-cta">Order</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="page-shell">
    <section class="auth-wrap">
      <div class="auth-panel">
        <span class="eyebrow">Create account</span>
        <h2>Join our ordering list</h2>
        <form action="https://jkorpela.fi/cgi-bin/echo.cgi" method="post" data-friendly-form>
          <div class="form-group">
            <label for="username">Login ID</label>
            <input type="text" id="username" name="username" autocomplete="username" required>
          </div>
          <div class="form-group">
            <label for="fullname">Full name</label>
            <input type="text" id="fullname" name="fullname" autocomplete="name" required>
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" minlength="16" autocomplete="new-password" required>
          </div>
          <div class="field-grid">
            <div class="form-group">
              <label for="mobile">Mobile number</label>
              <input type="tel" id="mobile" name="mobile" autocomplete="tel" required>
            </div>
            <div class="form-group">
              <label for="gender">Gender</label>
              <select id="gender" name="gender" required>
                <option value="">Select one</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
                <option value="prefer-not-to-say">Prefer not to say</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="email">Email address</label>
            <input type="email" id="email" name="email" autocomplete="email" required>
          </div>
          <div class="form-group">
            <label for="address">Address</label>
            <textarea id="address" name="address" autocomplete="street-address" required></textarea>
          </div>
          <div class="form-group">
            <label for="favorite">Favorite food</label>
            <input type="text" id="favorite" name="favorite" placeholder="Example: laksa with tofu">
          </div>
          <button type="submit">Create account</button>
          <p class="helper-link">Already registered? <a href="login.html">Login here</a></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-wrap">
      <p>&copy; 2026 NYP Yong Tau Foo. All rights reserved.</p>
      <div class="social-links">
        <a href="https://www.instagram.com/">Instagram</a>
        <a href="contact.html">Contact</a>
      </div>
    </div>
  </footer>
  <script src="js/site.js"></script>
</body>
</html>
